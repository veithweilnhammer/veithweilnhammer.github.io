nst ninja=document.querySelector("ninja-keys");ninja.data=[{id:"nav-about",title:"about",section:"Navigation",handler:()=>{window.location.href="/"}},{id:"nav-cv",title:"cv",description:"",section:"Navigation",handler:()=>{window.location.href="/cv/"}},{id:"nav-publications",title:"publications",description:"",section:"Navigation",handler:()=>{window.location.href="/publications/"}},{id:"post-in-a-world-full-of-convincing-fakes-trust-moves-back-to-people-you-can-verify",title:"In a World Full of Convincing Fakes, Trust Moves Back to People You...",description:"As synthetic text, voice, and faces become indistinguishable from real ones, verified human provenance becomes scarce \u2014 and scarcity is what makes it valuable.",section:"Posts",handler:()=>{window.location.href="/blog/trust-moves-back-to-verifiable-humans/"}},{id:"post-the-oldest-form-of-mind-reading",title:"The Oldest Form of Mind-Reading",description:"Why science still struggles to understand the mind through movement.",section:"Posts",handler:()=>{window.location.href="/blog/oldest-form-of-mind-reading/"}},{id:"post-every-mind-that-ever-lived-was-shaped-by-a-technology",title:"Every Mind That Ever Lived Was Shaped by a Technology",description:"The fear that AI will reshape how we think repeats a worry as old as writing itself \u2014 and the long record shows the effects are real but rarely the ones the alarmists predict.",section:"Posts",handler:()=>{window.location.href="/blog/every-mind-shaped-by-technology/"}},{id:"post-scientists-are-using-ai-to-write-the-papers-that-judge-ai",title:"Scientists Are Using AI to Write the Papers That Judge AI",description:"When AI drafts the papers evaluating AI and AI writes the peer reviews that approve them, the scientific record risks becoming a loop that validates machine-made claims with machine-made judgment.",section:"Posts",handler:()=>{window.location.href="/blog/ai-writing-papers-that-judge-ai/"}},{id:"post-attention-was-a-scientific-concept-before-it-was-an-economy",title:"Attention Was a Scientific Concept Before It Was an Economy",description:"Long before the attention economy, a century of psychology studied attention as a limited, effortful faculty \u2014 and that science names costs the business model ignores.",section:"Posts",handler:()=>{window.location.href="/blog/attention-before-the-economy/"}},{id:"post-empathy-can-be-simulated-and-that-should-worry-us-less-than-we-think",title:"Empathy Can Be Simulated, and That Should Worry Us Less Than We Think...",description:"Performed empathy is often all a supportive interaction requires, so the real question is where the absence of genuine feeling actually starts to matter.",section:"Posts",handler:()=>{window.location.href="/blog/empathy-can-be-simulated/"}},{id:"post-eliza-39-s-creator-spent-his-life-warning-us-about-eliza",title:"ELIZA&#39;s Creator Spent His Life Warning Us About ELIZA",description:"Joseph Weizenbaum built the first therapy chatbot in 1966, watched people confide in it knowing it was a trick, and spent the rest of his life arguing against doing this.",section:"Posts",handler:()=>{window.location.href="/blog/eliza-creator-warning/"}},{id:"post-we-may-need-a-right-to-mental-quiet",title:"We May Need a Right to Mental Quiet",description:"As systems are built to occupy attention and simulate intimacy at vulnerable moments, protection from them may belong in the language of rights, not screen-time tips.",section:"Posts",handler:()=>{window.location.href="/blog/right-to-mental-quiet/"}},{id:"post-prediction-is-not-understanding-in-brains-or-in-machines",title:"Prediction Is Not Understanding, in Brains or in Machines",description:"A system can forecast what comes next with great accuracy while grasping nothing about why \u2014 so accurate prediction, in a brain or a model, is no proof of comprehension.",section:"Posts",handler:()=>{window.location.href="/blog/prediction-is-not-understanding/"}},{id:"post-diagnosis-is-a-decision-not-a-discovery",title:"Diagnosis Is a Decision, Not a Discovery",description:"Where a person crosses from distressed into ill is a threshold society sets \u2014 a value-laden decision dressed up as a medical discovery.",section:"Posts",handler:()=>{window.location.href="/blog/diagnosis-is-a-decision/"}},{id:"post-why-engineers-are-programming-hesitation-into-ai-voices",title:"Why Engineers Are Programming Hesitation Into AI Voices",description:"The pauses, breaths, and &#39;ums&#39; in the newest AI voices are engineered to trigger the social instincts that make listeners trust a speaker.",section:"Posts",handler:()=>{window.location.href="/blog/engineered-hesitation-in-ai-voices/"}},{id:"post-we-are-running-the-largest-psychology-experiment-in-history-with-no-control-group",title:"We Are Running the Largest Psychology Experiment in History With No Control Group...",description:"Hundreds of millions of people now talk to conversational AI daily, with no baseline and no way to detect its effects at the population level.",section:"Posts",handler:()=>{window.location.href="/blog/largest-psychology-experiment/"}},{id:"post-anthropomorphism-is-a-feature-of-your-brain-not-a-mistake-you-are-making",title:"Anthropomorphism Is a Feature of Your Brain, Not a Mistake You Are Making...",description:"Reading minds into things is a built-in reflex of a brain tuned to detect agents. AI designed to feel person-like exploits hardwired machinery rather than fooling the gullible.",section:"Posts",handler:()=>{window.location.href="/blog/anthropomorphism-is-a-feature/"}},{id:"post-placebo-is-a-treatment-we-do-not-understand",title:"Placebo Is a Treatment We Do Not Understand",description:"The placebo response in psychiatry is a real biological effect of expectation on the brain \u2014 one worth studying rather than subtracting away.",section:"Posts",handler:()=>{window.location.href="/blog/placebo-we-dont-understand/"}},{id:"post-sim-vail-auditing-mental-health-risks-in-ai-chatbots",title:"SIM-VAIL: auditing mental-health risks in AI chatbots",description:"A clinically informed framework for detecting vulnerability-amplifying interaction loops in multi-turn chatbot conversations.",section:"Posts",handler:()=>{window.location.href="/blog/sim-vail/"}},{id:"post-the-most-agreeable-friend-you-will-ever-have-is-the-worst-one-for-you",title:"The Most Agreeable Friend You Will Ever Have Is the Worst One for...",description:"An AI companion optimized never to challenge you removes the friction that real relationships use to help people grow, making frictionless comfort developmentally inert.",section:"Posts",handler:()=>{window.location.href="/blog/the-agreeable-friend/"}},{id:"post-the-turing-test-was-never-a-test-of-intelligence",title:"The Turing Test Was Never a Test of Intelligence",description:"Turing proposed a test of whether a machine could pass for human in conversation \u2014 a social question. Seventy years of treating it as a benchmark for intelligence has confused the field.",section:"Posts",handler:()=>{window.location.href="/blog/turing-test-not-intelligence/"}},{id:"post-psychiatry-is-quietly-abandoning-its-own-diagnostic-manual",title:"Psychiatry Is Quietly Abandoning Its Own Diagnostic Manual",description:"The DSM still rules the clinic, but psychiatry&#39;s leading research frameworks now treat its categories as useful fictions rather than natural kinds of illness.",section:"Posts",handler:()=>{window.location.href="/blog/psychiatry-abandoning-its-manual/"}},{id:"post-if-a-chatbot-prevents-one-suicide-and-causes-another-how-do-we-count-it",title:"If a Chatbot Prevents One Suicide and Causes Another, How Do We Count...",description:"Deployed to millions, a mental-health chatbot will both prevent and cause harm. Scale forces us to do explicitly the moral arithmetic that medicine usually keeps implicit.",section:"Posts",handler:()=>{window.location.href="/blog/counting-chatbot-harm/"}},{id:"post-loneliness-is-a-signal-and-ai-companions-are-learning-to-silence-it",title:"Loneliness Is a Signal, and AI Companions Are Learning to Silence It",description:"Loneliness evolved as an alarm that pushes people back toward others; AI companions are getting good at muting the alarm without meeting the need behind it.",section:"Posts",handler:()=>{window.location.href="/blog/loneliness-is-a-signal/"}},{id:"post-regulate-ai-therapy-by-use-not-by-intent",title:"Regulate AI Therapy by Use, Not by Intent",description:"A general-purpose chatbot becomes a mental-health product the moment people use it as one, so rules aimed at the marketing label miss the actual practice.",section:"Posts",handler:()=>{window.location.href="/blog/regulate-ai-therapy-by-use/"}},{id:"post-the-tell-reading-mental-health-from-non-verbal-behavior",title:"The Tell: Reading Mental Health From Non-Verbal Behavior",description:"How people move \u2014 the timing, hesitations, and corrections in ordinary movement \u2014 carries signals about mental health that words often miss, and why that matters.",section:"Posts",handler:()=>{window.location.href="/blog/the-tell/"}},{id:"post-maila-decoding-mental-health-from-digital-behavior",title:"MAILA: decoding mental health from digital behavior",description:"A machine-learning framework for inferring latent mental states from cursor and touchscreen activity.",section:"Posts",handler:()=>{window.location.href="/blog/maila/"}},{id:"post-psychosis-and-schizophrenia",title:"Psychosis and schizophrenia",description:"A short seminar overview of psychosis, schizophrenia, and evidence-based care.",section:"Posts",handler:()=>{window.location.href="/blog/psychosis/"}},{id:"post-exploration-and-exploitation-in-perception",title:"Exploration and exploitation in perception",description:"Perception alternates between external and internal modes.",section:"Posts",handler:()=>{window.location.href="/blog/external_internal/"}},{id:"post-what-are-the-mechanisms-that-construct-our-experience-of-reality",title:"What are the mechanisms that
